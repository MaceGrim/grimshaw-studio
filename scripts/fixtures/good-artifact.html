<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Artifact</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem 3rem;
      color: #e0e0e0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    .card h1 {
      color: #0f9b8e;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Grimshaw Studio</h1>
    <p>This artifact has no errors.</p>
  </div>
</body>
</html>
