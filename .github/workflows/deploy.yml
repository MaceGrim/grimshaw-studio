name: Deploy Astro Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout grimshaw-studio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SITE/package-lock.json

      - name: Install dependencies
        working-directory: SITE
        run: npm ci

      - name: Build astro site
        working-directory: SITE
        run: npm run build

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: macegrim/macegrim.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy-target

      - name: Deploy built site
        run: |
          # Clear old files (keep .git)
          find deploy-target -maxdepth 1 -not -name '.git' -not -name '.' -not -name '..' -exec rm -rf {} +

          # Copy built site
          cp -r SITE/dist/* deploy-target/

          # Add .nojekyll to bypass Jekyll processing
          touch deploy-target/.nojekyll

          # Commit and push
          cd deploy-target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy from grimshaw-studio @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
